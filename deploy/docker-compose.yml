name: zhiyue

x-health: &py-health
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 5s

services:
  storage-service:
    build: ../services/storage-service
    image: zhiyue/storage-service:latest
    environment:
      DB_PATH: /data/zhiyue.db
    volumes:
      - zhiyue-data:/data
    networks: [zhiyue-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8003/health')"]

  mcp-tool-service:
    build: ../services/mcp-tool-service
    image: zhiyue/mcp-tool-service:latest
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8002"
      STORAGE_URL: http://storage-service:8003
    ports:
      - "8002:8002"   # 暴露 SSE 端点，便于 MCP Inspector / 集成测试直连
    depends_on:
      storage-service:
        condition: service_healthy
    networks: [zhiyue-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import socket;socket.create_connection(('localhost',8002),3).close()"]

  agent-service:
    build: ../services/agent-service
    image: zhiyue/agent-service:latest
    env_file: [.env]
    environment:
      MCP_SSE_URL: http://mcp-tool-service:8002/sse
    depends_on:
      mcp-tool-service:
        condition: service_healthy
    networks: [zhiyue-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8001/health')"]

  ingestion-service:
    build: ../services/ingestion-service
    image: zhiyue/ingestion-service:latest
    environment:
      STORAGE_URL: http://storage-service:8003
    ports:
      - "8004:8004"
    depends_on:
      storage-service:
        condition: service_healthy
    networks: [zhiyue-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8004/health')"]

  api-gateway:
    build: ../services/api-gateway
    image: zhiyue/api-gateway:latest
    environment:
      AGENT_URL: http://agent-service:8001
      STORAGE_URL: http://storage-service:8003
      INGESTION_URL: http://ingestion-service:8004
    ports:
      - "8080:8080"
    depends_on:
      agent-service:
        condition: service_healthy
    networks: [zhiyue-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8080/health')"]

networks:
  zhiyue-net: {}

volumes:
  zhiyue-data: {}
