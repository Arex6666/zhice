name: zhice

x-health: &py-health
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 5s

services:
  storage-service:
    build: ../services/storage-service
    image: zhice/storage-service:latest
    environment:
      DB_PATH: /data/zhice.db
    volumes:
      - zhice-data:/data
    networks: [zhice-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8003/health')"]

  mcp-tool-service:
    build: ../services/mcp-tool-service
    image: zhice/mcp-tool-service:latest
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8002"
      STORAGE_URL: http://storage-service:8003
    ports:
      - "8002:8002"   # 暴露 SSE 端点，便于 MCP Inspector / 集成测试直连
    depends_on:
      storage-service:
        condition: service_healthy
    networks: [zhice-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import socket;socket.create_connection(('localhost',8002),3).close()"]

  agent-service:
    build: ../services/agent-service
    image: zhice/agent-service:latest
    env_file: [.env]
    environment:
      MCP_SSE_URL: http://mcp-tool-service:8002/sse
      XSEC_MODEL_DIR: /models       # offline-runner 训练的横截面模型共享卷(L3 推理接线后消费)
    volumes:
      - zhice-models:/models
    depends_on:
      mcp-tool-service:
        condition: service_healthy
    networks: [zhice-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8001/health')"]

  ingestion-service:
    build: ../services/ingestion-service
    image: zhice/ingestion-service:latest
    environment:
      STORAGE_URL: http://storage-service:8003
    ports:
      - "8004:8004"
    depends_on:
      storage-service:
        condition: service_healthy
    networks: [zhice-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8004/health')"]

  api-gateway:
    build: ../services/api-gateway
    image: zhice/api-gateway:latest
    environment:
      AGENT_URL: http://agent-service:8001
      STORAGE_URL: http://storage-service:8003
      INGESTION_URL: http://ingestion-service:8004
    ports:
      - "8080:8080"
    depends_on:
      agent-service:
        condition: service_healthy
    networks: [zhice-net]
    restart: unless-stopped
    healthcheck:
      <<: *py-health
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8080/health')"]

  # 离线重计算 runner（§3.4 offline 工具集中执行点；不进委员会 SSE 热路径）。
  offline-runner:
    build:
      context: ..
      dockerfile: services/offline-runner/Dockerfile
    image: zhice/offline-runner:latest
    environment:
      STORAGE_URL: http://storage-service:8003
      XSEC_MODEL_DIR: /models
      RUN_ON_START: "0"            # 启动即跑一轮(默认关; 演示时设 1 或用一次性 CLI)
      FACTOR_EVAL_SEC: "604800"    # 周频 factor_eval 批
      XSEC_TRAIN_SEC: "2592000"    # 月频 xsec 训练
    volumes:
      - zhice-models:/models
    depends_on:
      storage-service:
        condition: service_healthy
    networks: [zhice-net]
    restart: unless-stopped

networks:
  zhice-net: {}

volumes:
  zhice-data: {}
  zhice-models: {}
