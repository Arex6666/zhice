<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智策 ZhiCe · 多智能体金融研判</title>
<style>
  :root {
    --bg:        #0e1311;
    --bg-soft:   #141b18;
    --panel:     #161f1b;
    --panel-2:   #1b2620;
    --line:      #26332c;
    --ink:       #e7efe9;
    --ink-soft:  #9fb2a6;
    --ink-faint: #6a7d72;
    --jade:      #3fcf8e;
    --jade-deep: #1f8f63;
    --jade-glow: rgba(63,207,142,.16);
    --amber:     #d9b25f;
    --danger:    #e2675f;
    --blue:      #5fa8e2;
    --radius:    14px;
    --mono: "Cascadia Code","JetBrains Mono","Consolas","SFMono-Regular",monospace;
    --sans: "Microsoft YaHei","PingFang SC","Segoe UI","Hiragino Sans GB",sans-serif;
    --serif: "DengXian","Georgia","Songti SC","Microsoft YaHei",serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 85% -10%, var(--jade-glow), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(31,143,99,.10), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    min-height: 100%;
  }
  body::before {
    content:""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 46px 46px, 46px 46px;
    -webkit-mask-image: radial-gradient(circle at 50% 30%, #000 0%, transparent 80%);
            mask-image: radial-gradient(circle at 50% 30%, #000 0%, transparent 80%);
    opacity: .12;
  }
  body::after {
    content:""; position: fixed; inset:0; pointer-events:none; z-index:0; opacity:.035;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 0 24px 60px; }

  /* ---------- Header ---------- */
  header { padding: 24px 0 16px; }
  .brandrow { display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
  .brand { display: flex; align-items: baseline; gap: 12px; animation: rise .6s ease both; }
  .brand .logo { font-family: var(--serif); font-size: 34px; font-weight: 700; letter-spacing: 2px;
    color: var(--ink); text-shadow: 0 0 26px var(--jade-glow); }
  .brand .logo b { color: var(--jade); }
  .brand .en { font-family: var(--mono); font-size: 11px; letter-spacing: 4px; color: var(--ink-faint); text-transform: uppercase; }
  .brand .sub { font-family: var(--serif); font-size: 15px; color: var(--ink-soft); letter-spacing: 2px; padding-left: 6px; border-left: 1px solid var(--line); }
  .disclaimer-banner {
    font-family: var(--mono); font-size: 11px; letter-spacing: .5px; color: var(--amber);
    border: 1px solid rgba(217,178,95,.35); background: rgba(217,178,95,.07);
    padding: 7px 14px; border-radius: 20px; display: inline-flex; align-items: center; gap: 8px;
    animation: rise .6s .05s ease both;
  }
  .disclaimer-banner::before { content:"⚠"; }

  /* ---------- Control bar ---------- */
  .control { margin-top: 18px; border: 1px solid var(--line); border-radius: var(--radius);
    background: linear-gradient(180deg, var(--bg-soft), transparent); padding: 16px 18px;
    display: flex; flex-direction: column; gap: 12px; animation: rise .6s .1s ease both; }
  .control .topline { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .symwrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 260px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 8px 12px;
    transition: border-color .2s, box-shadow .2s; }
  .symwrap:focus-within { border-color: var(--jade-deep); box-shadow: 0 0 0 3px var(--jade-glow); }
  .symwrap .lbl { font-family: var(--mono); font-size: 11px; color: var(--jade); letter-spacing: 1px; }
  #symbol { flex: 1; background: none; border: none; outline: none; color: var(--ink);
    font-family: var(--mono); font-size: 15px; letter-spacing: 1px; }
  #symbol::placeholder { color: var(--ink-faint); }
  .markethint { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); }
  .markethint b { color: var(--ink-soft); }

  .modes { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .modebtn { font-family: var(--sans); font-size: 13px; color: var(--ink-soft);
    background: var(--panel); border: 1px solid var(--line); padding: 8px 16px; border-radius: 10px;
    cursor: pointer; transition: .18s; display: flex; align-items: center; gap: 6px; }
  .modebtn small { font-family: var(--mono); font-size: 9px; color: var(--ink-faint); letter-spacing: 1px; text-transform: uppercase; }
  .modebtn:hover { border-color: var(--jade-deep); color: var(--jade); transform: translateY(-1px); }
  .modebtn.active { background: linear-gradient(135deg, var(--jade-deep), var(--jade)); color: #06140d; border-color: transparent; box-shadow: 0 4px 18px var(--jade-glow); }
  .modebtn.active small { color: rgba(6,20,13,.7); }
  .modebtn.ghost { margin-left: auto; }

  /* ---------- Quote strip ---------- */
  .quotebar { margin-top: 18px; display: flex; gap: 22px; align-items: baseline; flex-wrap: wrap;
    border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); padding: 16px 20px; }
  .quotebar .qname { font-family: var(--serif); font-size: 20px; font-weight: 600; letter-spacing: 1px; }
  .quotebar .qsym { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); }
  .quotebar .qprice { font-family: var(--mono); font-size: 30px; font-weight: 700; }
  .quotebar .qchg { font-family: var(--mono); font-size: 15px; font-weight: 600; }
  .quotebar .qmeta { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .up { color: var(--danger); }     /* A股习惯：涨红 */
  .down { color: var(--jade); }      /* 跌绿 */
  .flat { color: var(--ink-soft); }

  /* badges */
  .badge { font-family: var(--mono); font-size: 10px; letter-spacing: .5px; padding: 3px 9px; border-radius: 20px;
    border: 1px solid var(--line); white-space: nowrap; }
  .badge.fresh { color: var(--jade); border-color: var(--jade-deep); background: rgba(63,207,142,.08); }
  .badge.delayed { color: var(--amber); border-color: rgba(217,178,95,.4); background: rgba(217,178,95,.08); }
  .badge.stale, .badge.error { color: var(--danger); border-color: rgba(226,103,95,.4); background: rgba(226,103,95,.08); }
  .badge.fallback { color: var(--blue); border-color: rgba(95,168,226,.4); background: rgba(95,168,226,.08); }
  .badge.tag { color: var(--ink-soft); }
  .badge.halt { color: var(--amber); border-color: rgba(217,178,95,.4); }
  .badge.lu { color: var(--danger); border-color: rgba(226,103,95,.4); }
  .badge.ld { color: var(--jade); border-color: var(--jade-deep); }

  /* ---------- Section / cards ---------- */
  section { margin-top: 26px; }
  .sec-title { font-family: var(--mono); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--jade); display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .sec-title::before { content:""; width: 6px; height: 6px; background: var(--jade); border-radius: 2px; box-shadow: 0 0 8px var(--jade); }
  .sec-title .cn { font-family: var(--serif); font-size: 16px; letter-spacing: 1px; color: var(--ink); text-transform: none; }

  .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); padding: 18px; }
  .panel-2 { background: var(--panel-2); }

  /* charts */
  #chart-main { width: 100%; height: 380px; }
  #chart-osc  { width: 100%; height: 180px; margin-top: 10px; }
  .chart-note { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 8px; }

  /* committee grid */
  .grid { display: grid; gap: 16px; }
  .grid.mem { grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
  .member { border: 1px solid var(--line); border-radius: 12px; background: var(--panel-2); padding: 15px 16px; animation: rise .4s ease both; }
  .member .head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .member .lens { font-family: var(--serif); font-size: 15px; font-weight: 600; letter-spacing: 1px; }
  .verdict { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 3px 11px; border-radius: 20px; letter-spacing: 1px; }
  .v-long  { color: var(--danger); background: rgba(226,103,95,.12); border: 1px solid rgba(226,103,95,.4); }
  .v-short { color: var(--jade); background: rgba(63,207,142,.1); border: 1px solid var(--jade-deep); }
  .v-flat  { color: var(--ink-soft); background: rgba(159,178,166,.08); border: 1px solid var(--line); }
  .v-abst  { color: var(--ink-faint); background: rgba(106,125,114,.1); border: 1px dashed var(--line); }

  .conf { margin: 8px 0 12px; }
  .conf .meta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--ink-faint); margin-bottom: 4px; letter-spacing: 1px; }
  .conf .track { height: 7px; border-radius: 6px; background: #0c120f; overflow: hidden; border: 1px solid var(--line); }
  .conf .fill { height: 100%; background: linear-gradient(90deg, var(--jade-deep), var(--jade)); border-radius: 6px; transition: width .6s ease; }

  .reasons { list-style: none; margin: 0 0 12px; padding: 0; display: flex; flex-direction: column; gap: 5px; }
  .reasons li { font-size: 12.5px; line-height: 1.55; color: var(--ink-soft); padding-left: 14px; position: relative; }
  .reasons li::before { content:"▸"; position: absolute; left: 0; color: var(--jade-deep); }

  .ev-title { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--jade); margin: 4px 0 6px; text-transform: uppercase; }
  .ev { font-family: var(--mono); font-size: 11px; line-height: 1.7; color: var(--ink-soft); background: #0c120f;
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; }
  .ev .row { word-break: break-word; }
  .ev .etype { color: var(--amber); }
  .ev .esrc { color: var(--jade); }
  .ev .eval { color: var(--ink); }
  .ev .eint { color: var(--ink-faint); }
  .ev.counter { border-color: rgba(226,103,95,.35); }
  .ev.counter .etype { color: var(--danger); }

  .chips-sm { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip-risk { font-family: var(--mono); font-size: 10.5px; color: var(--amber); border: 1px solid rgba(217,178,95,.3);
    background: rgba(217,178,95,.06); border-radius: 16px; padding: 3px 10px; }
  .chip-counter { font-family: var(--mono); font-size: 10.5px; color: var(--danger); border: 1px solid rgba(226,103,95,.3);
    background: rgba(226,103,95,.06); border-radius: 16px; padding: 3px 10px; }
  .abstain-box { font-size: 12.5px; color: var(--ink-faint); font-style: italic; padding: 8px 0; }

  /* chairman + ring */
  .chair-grid { display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: center; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .ring { position: relative; width: 160px; height: 160px; }
  .ring svg { transform: rotate(-90deg); }
  .ring .ctr { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .pct { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--jade); }
  .ring .lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--ink-faint); text-transform: uppercase; }
  .ring-verdict { font-family: var(--serif); font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .chair-detail dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; }
  .chair-detail dt { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 1px; white-space: nowrap; }
  .chair-detail dd { margin: 0; font-size: 13.5px; line-height: 1.6; color: var(--ink); }

  /* counter-evidence decision panel (the standout) */
  .ce-panel { border: 1px solid rgba(226,103,95,.25); border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(226,103,95,.04), transparent); padding: 4px; }
  .ce-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px; }
  .ce-block { background: var(--panel-2); border: 1px solid var(--line); border-radius: 11px; padding: 13px 15px; }
  .ce-block.support { border-left: 3px solid var(--jade); }
  .ce-block.against { border-left: 3px solid var(--danger); }
  .ce-block.invalid { border-left: 3px solid var(--amber); }
  .ce-block.risk    { border-left: 3px solid var(--amber); }
  .ce-block.dissent { border-left: 3px solid var(--blue); }
  .ce-block.reason  { border-left: 3px solid var(--jade-deep); }
  .ce-block.full { grid-column: 1 / -1; }
  .ce-block .k { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 7px; display: flex; align-items: center; gap: 7px; }
  .ce-block .k .cn { font-family: var(--serif); font-size: 13.5px; letter-spacing: 1px; text-transform: none; }
  .ce-block.support .k .cn { color: var(--jade); }
  .ce-block.against .k .cn { color: var(--danger); }
  .ce-block.invalid .k .cn { color: var(--amber); }
  .ce-block .v { font-size: 13.5px; line-height: 1.65; color: var(--ink); }

  .gov { margin-top: 14px; }
  .gov .govlog { font-family: var(--mono); font-size: 11.5px; background: #0c120f; border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .gov .govlog .ln { display: flex; gap: 10px; align-items: baseline; color: var(--ink-soft); }
  .gov .govlog .ln .idx { color: var(--jade-deep); }
  .gov .govlog .ln .rule { color: var(--amber); }
  .gov .govlog .empty { color: var(--ink-faint); }

  /* ml ticket */
  .ml-ticket { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .ml-ticket .stub { border: 1px dashed var(--line); border-radius: 11px; background: #0c120f; padding: 14px 18px; min-width: 150px; }
  .ml-ticket .stub .k { font-family: var(--mono); font-size: 9.5px; letter-spacing: 1.5px; color: var(--ink-faint); text-transform: uppercase; }
  .ml-ticket .stub .v { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--jade); margin-top: 4px; }
  .ml-ticket .stub .v.abst { color: var(--ink-faint); font-size: 20px; }
  .ml-ticket .note { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; flex: 1; min-width: 200px; }

  /* news */
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item { display: flex; gap: 12px; align-items: baseline; padding: 9px 12px; border: 1px solid var(--line);
    border-radius: 9px; background: var(--panel-2); border-left: 2px solid var(--jade-deep); transition: .18s; }
  .news-item:hover { border-color: var(--jade-deep); }
  .news-item a { color: var(--ink); text-decoration: none; font-size: 13px; line-height: 1.5; flex: 1; word-break: break-word; }
  .news-item a:hover { color: var(--jade); }
  .news-item .meta { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); white-space: nowrap; }

  /* signals (quick) */
  .sig-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .sig-list .sig { font-size: 13px; color: var(--ink); border: 1px solid var(--line); background: var(--panel-2);
    border-radius: 9px; padding: 8px 13px; }
  .ind-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 14px; }
  .ind-grid .cell { border: 1px solid var(--line); border-radius: 9px; background: #0c120f; padding: 10px 12px; }
  .ind-grid .cell .k { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 1px; }
  .ind-grid .cell .v { font-family: var(--mono); font-size: 16px; color: var(--ink); margin-top: 4px; }

  /* review */
  .review-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 14px; }
  .stat { border: 1px solid var(--line); border-radius: 11px; background: var(--panel-2); padding: 14px 16px; }
  .stat .k { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--ink-faint); text-transform: uppercase; }
  .stat .v { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--jade); margin-top: 5px; }
  .stat .v.warn { color: var(--amber); }
  .review-note { margin-top: 16px; font-size: 13.5px; line-height: 1.7; color: var(--ink); padding: 14px 16px;
    border: 1px solid var(--line); border-radius: 11px; background: var(--panel-2); border-left: 3px solid var(--jade); }
  .review-note.warn { border-left-color: var(--amber); }
  .bymem { margin-top: 14px; }
  .bymem .row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 12px;
    padding: 6px 0; border-bottom: 1px dashed var(--line); color: var(--ink-soft); }

  /* teach */
  .teach-list { display: flex; flex-direction: column; gap: 12px; }
  .term { border: 1px solid var(--line); border-radius: 11px; background: var(--panel-2); padding: 14px 16px; }
  .term .t { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--jade); letter-spacing: 1px; margin-bottom: 6px; }
  .term .d { font-size: 13.5px; line-height: 1.7; color: var(--ink-soft); }

  /* states */
  .loading { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 12.5px; color: var(--jade); padding: 30px 0; justify-content: center; }
  .loading i { width: 8px; height: 8px; border-radius: 50%; background: var(--jade); animation: blink 1.2s infinite; }
  .loading i:nth-child(2){ animation-delay:.2s } .loading i:nth-child(3){ animation-delay:.4s }
  .notice { border: 1px solid rgba(217,178,95,.4); background: rgba(217,178,95,.07); border-radius: 11px;
    padding: 14px 18px; color: var(--amber); font-size: 13.5px; line-height: 1.6; }
  .notice.err { border-color: rgba(226,103,95,.4); background: rgba(226,103,95,.07); color: var(--danger); }
  .notice b { font-family: var(--mono); }
  .empty-soft { color: var(--ink-faint); font-size: 13px; padding: 12px 0; }
  .disclaimer-foot { margin-top: 22px; font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
    text-align: center; line-height: 1.7; border-top: 1px solid var(--line); padding-top: 18px; }

  /* status modal */
  .modal-bg { position: fixed; inset: 0; z-index: 50; background: rgba(4,8,6,.7); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { width: 460px; max-width: 100%; border: 1px solid var(--line); border-radius: var(--radius);
    background: var(--panel); padding: 22px 24px; animation: rise .3s ease both; }
  .modal h3 { font-family: var(--serif); margin: 0 0 16px; font-size: 17px; letter-spacing: 1px; }
  .modal .srow { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px dashed var(--line); font-family: var(--mono); font-size: 13px; }
  .modal .srow .k { color: var(--ink-soft); }
  .modal .srow .ok { color: var(--jade); } .modal .srow .down { color: var(--danger); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; }
  .dot.ok { background: var(--jade); box-shadow: 0 0 7px var(--jade); }
  .dot.bad { background: var(--danger); box-shadow: 0 0 7px var(--danger); }
  .modal .mc { margin-top: 14px; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
  .modal .close { margin-top: 18px; width: 100%; background: linear-gradient(135deg, var(--jade), var(--jade-deep));
    color: #06140d; border: none; font-family: var(--mono); font-weight: 700; padding: 10px; border-radius: 9px; cursor: pointer; }

  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes blink { 0%,100%{ opacity:.25; transform: translateY(0) } 50%{ opacity:1; transform: translateY(-3px) } }
  @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.4 } }
  ::-webkit-scrollbar { width: 9px; height: 9px; } ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 9px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--jade-deep); }

  @media (max-width: 760px){
    .chair-grid { grid-template-columns: 1fr; }
    .ce-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- ===== Header ===== -->
  <header>
    <div class="brandrow">
      <div class="brand">
        <span class="logo">智<b>策</b></span>
        <span class="en">ZhiCe</span>
        <span class="sub">多智能体金融研判</span>
      </div>

<script>
"use strict";
/* ---------------- helpers ---------------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function safeUrl(u){ try{ const x=new URL(u, location.origin); return (x.protocol==='http:'||x.protocol==='https:') ? x.href : null; }catch(e){ return null; } }
function $(id){ return document.getElementById(id); }
function fmt(n, d){ return (n==null || isNaN(n)) ? '—' : Number(n).toFixed(d==null?2:d); }
function pct(n){ return (n==null || isNaN(n)) ? '—' : (Number(n)*100).toFixed(0)+'%'; }

async function getJSON(url, opts){
  const r = await fetch(url, opts);
  let data;
  try { data = await r.json(); }
  catch(e){ return { __httperr: true, status: r.status, error: '响应非 JSON（上游可能降级/不可达）' }; }
  if (!r.ok && data && typeof data === 'object' && !data.error) data.__httperr = true;
  return data;
}
/* an endpoint failure looks like {error:...} or {detail:...} or {__httperr} */
function isErr(d){
  return !d || (typeof d === 'object' && !Array.isArray(d) && (d.error || d.detail || d.__httperr));
}
function errMsg(d){
  if (!d) return '无数据';
  return d.error || d.detail || (d.__httperr ? '服务不可达或降级（HTTP '+(d.status||'?')+'）' : '数据异常');
}

const DATA_STATUS_CN = { fresh:'实时', delayed:'延迟', stale:'过期', error:'错误', fallback:'回退源' };

/* verdict -> class + label */
function verdictClass(v){ return v==='偏多' ? 'v-long' : v==='偏空' ? 'v-short' : 'v-flat'; }

/* ---------------- state ---------------- */
let MODE = 'quick';
let chartMain = null, chartOsc = null, btChart = null;
const hasECharts = (typeof echarts !== 'undefined');

/* ---------------- mode buttons ---------------- */
document.querySelectorAll('.modebtn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.modebtn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    MODE = btn.dataset.mode;
    run();
  });
});
$('symbol').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
$('statusBtn').addEventListener('click', openStatus);

/* ===================================================================
   MAIN RUN
=================================================================== */
function curSymbol(){ return ($('symbol').value || '').trim() || 'ASHARE:600519'; }

async function run(){
  const sym = curSymbol();
  const teachOrReview = (MODE === 'teach' || MODE === 'review');

  // sections visibility
  $('chartSec').style.display  = teachOrReview ? 'none' : '';
  $('newsSec').style.display   = (MODE === 'teach' || MODE === 'review') ? 'none' : '';
  $('quotebar').style.display  = teachOrReview ? 'none' : '';

  // charts & quote only for quick/deep
  if (!teachOrReview){
    loadQuote(sym);
    loadCharts(sym);
    loadNews(sym);
  }

  // analysis area
  const A = $('analysis');
  A.innerHTML = '<section><div class="card"><div class="loading"><i></i><i></i><i></i> '
    + ({quick:'快速体检中…', deep:'委员会研判中（4 位分析师 + ML 票 → 治理引擎 → 主席汇总，约需 10–60s）…',
        review:'读取自审计记录…', teach:'载入教学内容…'}[MODE] || '处理中…') + '</div></section>';

  try {
    if (MODE === 'teach')      return renderTeach(await getJSON('/api/finance/analyze', postBody(sym,'teach')));
    if (MODE === 'review')     return renderReview(await getJSON('/api/finance/analyze', postBody(sym,'review')));
    const data = await getJSON('/api/finance/analyze', postBody(sym, MODE));
    if (isErr(data)) { A.innerHTML = sectionNotice('研判失败', errMsg(data), true); return; }
    if (MODE === 'quick') renderQuick(data);
    else                  renderDeep(data);
  } catch(e){
    A.innerHTML = sectionNotice('请求异常', String(e), true);
  }
}
function postBody(symbol, mode){
  return { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ symbol, mode }) };
}
function sectionNotice(title, msg, isError){
  return '<section><div class="sec-title">'+esc(title)+'</div>'
    + '<div class="card"><div class="notice'+(isError?' err':'')+'">'+esc(msg)+'</div></div></section>';
}

/* ===================================================================
   QUOTE strip
=================================================================== */
async function loadQuote(sym){
  const bar = $('quotebar'); bar.style.display = '';
  bar.innerHTML = '<div class="loading"><i></i><i></i><i></i> 行情加载中…</div>';
  const q = await getJSON('/api/finance/quote?symbol=' + encodeURIComponent(sym));
  if (isErr(q)){
    bar.innerHTML = '<div class="notice err" style="width:100%">行情不可用：'+esc(errMsg(q))
      + ' — 该市场可能不可达或被限流，已降级。</div>';
    return;
  }
  const chg = q.change_pct;
  const dir = chg == null ? 'flat' : chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
  const arrow = chg == null ? '' : chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
  const st = q.data_status || 'fresh';
  let badges = '<span class="badge '+esc(st)+'">'+ (DATA_STATUS_CN[st]||st) +'</span>';
  if (q.halted)     badges += ' <span class="badge halt">停牌</span>';
  if (q.limit_up)   badges += ' <span class="badge lu">涨停</span>';
  if (q.limit_down) badges += ' <span class="badge ld">跌停</span>';
  if (q.source)     badges += ' <span class="badge tag">源 '+esc(q.source)+'</span>';

  bar.innerHTML =
      '<div><div class="qname">'+esc(q.name||sym)+'</div><div class="qsym">'+esc(sym)+'</div></div>'
    + '<div class="qprice '+dir+'">'+ fmt(q.price) +'</div>'
    + '<div class="qchg '+dir+'">'+arrow+' '+ (chg==null?'—':(chg>0?'+':'')+fmt(chg)+'%') +'</div>'
    + '<div class="qmeta">昨收 '+fmt(q.prev_close)+' &nbsp;'+badges+'</div>';
}

/* ===================================================================
   CHARTS (candlestick + MA overlay + volume; MACD/RSI sub-chart)
   indicators endpoint returns only the *latest* scalar MA values,
   so we compute MA/MACD/RSI series locally from kline for overlays.
=================================================================== */
function sma(arr, n){
  const out = new Array(arr.length).fill(null);
  let sum = 0;
  for (let i=0;i<arr.length;i++){
    sum += arr[i];
    if (i>=n) sum -= arr[i-n];
    if (i>=n-1) out[i] = +(sum/n).toFixed(4);
  }
  return out;
}
function ema(arr, n){
  const out = new Array(arr.length).fill(null);
  const k = 2/(n+1); let prev = null;
  for (let i=0;i<arr.length;i++){
    prev = prev==null ? arr[i] : arr[i]*k + prev*(1-k);
    out[i] = +prev.toFixed(4);
  }
  return out;
}
function macdSeries(closes){
  const ef = ema(closes,12), es = ema(closes,26);
  const dif = closes.map((_,i)=> +(ef[i]-es[i]).toFixed(4));
  const dea = ema(dif,9);
  const hist = dif.map((_,i)=> +((dif[i]-dea[i])*2).toFixed(4));
  return {dif, dea, hist};
}
function rsiSeries(closes, n){
  n = n||14;
  const out = new Array(closes.length).fill(null);
  let gain=0, loss=0;
  for (let i=1;i<closes.length;i++){
    const d = closes[i]-closes[i-1];
    const g = d>0?d:0, l = d<0?-d:0;
    if (i<=n){ gain+=g; loss+=l; if (i===n){ gain/=n; loss/=n; out[i]= loss===0?100:+(100-100/(1+gain/loss)).toFixed(2); } }
    else { gain=(gain*(n-1)+g)/n; loss=(loss*(n-1)+l)/n; out[i]= loss===0?100:+(100-100/(1+gain/loss)).toFixed(2); }
  }
  return out;
}

async function loadCharts(sym){
  if (!hasECharts){
    $('chartNote').innerHTML = '<span style="color:var(--danger)">ECharts 未加载（/static/vendor/echarts.min.js 缺失）— 图表降级。</span>';
    return;
  }
  if (!chartMain) chartMain = echarts.init($('chart-main'), null, { renderer:'canvas' });
  if (!chartOsc)  chartOsc  = echarts.init($('chart-osc'),  null, { renderer:'canvas' });
  chartMain.showLoading({ text:'载入 K 线…', textColor:'#9fb2a6', maskColor:'rgba(14,19,17,.6)', color:'#3fcf8e' });
  chartOsc.clear();

  const kl = await getJSON('/api/finance/kline?symbol=' + encodeURIComponent(sym) + '&count=120');
  chartMain.hideLoading();

  if (isErr(kl) || !Array.isArray(kl) || !kl.length){
    chartMain.clear();
    chartMain.setOption(emptyChartOption(isErr(kl) ? ('K线不可用：'+errMsg(kl)) : '该标的暂无 K 线数据（市场不可达/降级）'));
    return;
  }

  const dates  = kl.map(d => String(d.ts));
  const ohlc   = kl.map(d => [d.open, d.close, d.low, d.high]); // ECharts candlestick order
  const closes = kl.map(d => d.close);
  const vols   = kl.map((d,i) => ({ value: d.volume==null?0:d.volume,
                       itemStyle: { color: d.close >= d.open ? 'rgba(226,103,95,.55)' : 'rgba(63,207,142,.5)' } }));
  const ma5 = sma(closes,5), ma20 = sma(closes,20);
  const mac = macdSeries(closes), rsi = rsiSeries(closes,14);

  const axisLine = { lineStyle:{ color:'#26332c' } };
  const splitLine = { lineStyle:{ color:'rgba(38,51,44,.5)' } };
  const txt = { color:'#6a7d72', fontFamily:'Consolas, monospace', fontSize:10 };

  chartMain.setOption({
    backgroundColor:'transparent',
    animation:true,
    tooltip:{ trigger:'axis', axisPointer:{ type:'cross' }, backgroundColor:'#0c120f',
      borderColor:'#26332c', textStyle:{ color:'#e7efe9', fontFamily:'Consolas, monospace', fontSize:11 } },
    legend:{ data:['K线','MA5','MA20','成交量'], textStyle:{ color:'#9fb2a6', fontSize:11 }, top:0, right:10 },
    grid:[ { left:54, right:18, top:34, height:'58%' }, { left:54, right:18, top:'72%', height:'18%' } ],
    axisPointer:{ link:[{ xAxisIndex:'all' }] },
    xAxis:[
      { type:'category', data:dates, gridIndex:0, axisLine, axisLabel:txt, splitLine:{show:false}, boundaryGap:true },
      { type:'category', data:dates, gridIndex:1, axisLine, axisLabel:{show:false}, axisTick:{show:false} }
    ],
    yAxis:[
      { scale:true, gridIndex:0, axisLine, axisLabel:txt, splitLine },
      { scale:true, gridIndex:1, axisLine, axisLabel:{show:false}, splitLine:{show:false} }
    ],
    dataZoom:[
      { type:'inside', xAxisIndex:[0,1], start:55, end:100 },
      { type:'slider', xAxisIndex:[0,1], start:55, end:100, bottom:2, height:14,
        borderColor:'#26332c', fillerColor:'rgba(63,207,142,.12)', textStyle:{ color:'#6a7d72', fontSize:9 },
        handleStyle:{ color:'#1f8f63' }, dataBackground:{ lineStyle:{color:'#26332c'}, areaStyle:{color:'#161f1b'} } }
    ],
    series:[
      { name:'K线', type:'candlestick', data:ohlc, xAxisIndex:0, yAxisIndex:0,
        itemStyle:{ color:'#e2675f', color0:'#3fcf8e', borderColor:'#e2675f', borderColor0:'#3fcf8e' } },
      { name:'MA5', type:'line', data:ma5, xAxisIndex:0, yAxisIndex:0, smooth:true, symbol:'none',
        lineStyle:{ width:1.3, color:'#d9b25f' } },
      { name:'MA20', type:'line', data:ma20, xAxisIndex:0, yAxisIndex:0, smooth:true, symbol:'none',
        lineStyle:{ width:1.3, color:'#5fa8e2' } },
      { name:'成交量', type:'bar', data:vols, xAxisIndex:1, yAxisIndex:1 }
    ]
  }, true);

  // sub: MACD bars + DIF/DEA, plus RSI line on a second y-axis
  chartOsc.setOption({
    backgroundColor:'transparent',
    tooltip:{ trigger:'axis', backgroundColor:'#0c120f', borderColor:'#26332c',
      textStyle:{ color:'#e7efe9', fontFamily:'Consolas, monospace', fontSize:11 } },
    legend:{ data:['MACD','DIF','DEA','RSI14'], textStyle:{ color:'#9fb2a6', fontSize:10 }, top:0, right:10 },
    grid:{ left:54, right:48, top:24, bottom:18 },
    xAxis:{ type:'category', data:dates, axisLine, axisLabel:txt },
    yAxis:[
      { scale:true, axisLine, axisLabel:txt, splitLine },
      { scale:true, min:0, max:100, position:'right', axisLine, axisLabel:{ ...txt, formatter:'{value}' },
        splitLine:{show:false}, name:'RSI', nameTextStyle:{ color:'#6a7d72', fontSize:9 } }
    ],
    dataZoom:[ { type:'inside', start:55, end:100 } ],
    series:[
      { name:'MACD', type:'bar', data: mac.hist.map(v => ({ value:v,
          itemStyle:{ color: v>=0 ? 'rgba(226,103,95,.7)' : 'rgba(63,207,142,.6)' } })) },
      { name:'DIF', type:'line', data:mac.dif, symbol:'none', lineStyle:{ width:1, color:'#d9b25f' } },
      { name:'DEA', type:'line', data:mac.dea, symbol:'none', lineStyle:{ width:1, color:'#5fa8e2' } },
      { name:'RSI14', type:'line', yAxisIndex:1, data:rsi, symbol:'none', lineStyle:{ width:1.2, color:'#3fcf8e' },
        markLine:{ silent:true, symbol:'none', label:{ color:'#6a7d72', fontSize:9 },
          lineStyle:{ color:'#26332c', type:'dashed' }, data:[{ yAxis:70 },{ yAxis:30 }] } }
    ]
  }, true);

  $('chartNote').innerHTML = 'MA5（黄）/ MA20（蓝）叠加 · 量能（涨红跌绿）· 副图 MACD 柱 + DIF/DEA + RSI14。'
    + ' 共 ' + kl.length + ' 根 K 线 · 指标据收盘价本地滚动计算。';
}
function emptyChartOption(msg){
  return { backgroundColor:'transparent',
    title:{ text: msg, left:'center', top:'middle',
      textStyle:{ color:'#6a7d72', fontFamily:'Consolas, monospace', fontSize:13, fontWeight:'normal' } } };

/* ===================================================================
   NEWS
=================================================================== */
async function loadNews(sym){
  const box = $('newsBox');
  box.innerHTML = '<div class="loading"><i></i><i></i><i></i> 新闻加载中…</div>';
  const news = await getJSON('/api/finance/news?symbol=' + encodeURIComponent(sym) + '&limit=8');
  renderNewsInto(box, news);
}
function renderNewsInto(box, news){
  if (isErr(news)){ box.innerHTML = '<div class="notice err">新闻不可用：'+esc(errMsg(news))+'</div>'; return; }
  if (!Array.isArray(news) || !news.length){
    box.innerHTML = '<div class="empty-soft">暂无相关新闻（该市场新闻源可能不稳定或返回为空）。</div>'; return;
  }
  box.innerHTML = news.map(n => {
    const t = esc(n.title || '(无标题)');
    const su = safeUrl(n.url);  // 仅放行 http/https，拦截 javascript:/data: 点击型 XSS
    const a = su ? '<a href="'+esc(su)+'" target="_blank" rel="noopener">'+t+' ↗</a>' : '<span class="news-title">'+t+'</span>';
    const meta = esc([n.source, n.ts].filter(Boolean).join(' · '));
    return '<div class="news-item">'+a+'<span class="meta">'+meta+'</span></div>';
  }).join('');
}

/* ===================================================================
   QUICK mode
=================================================================== */
function renderQuick(data){
  const A = $('analysis');
  const sig = data.signals || {};
  const sigs = Array.isArray(sig.signals) ? sig.signals : [];
  const ind = sig.indicators || {};
  let html = '<section><div class="sec-title">Quick · 快速体检 <span class="cn">规则信号</span></div><div class="card">';
  if (!sigs.length){
    html += '<div class="empty-soft">'+esc(sig.text || '无显著信号')+'</div>';
  } else {
    html += '<div class="sig-list">' + sigs.map(s => '<span class="sig">'+esc(s)+'</span>').join('') + '</div>';
  }
  // indicator cells
  const cells = [
    ['MA5', fmt(ind.ma5)], ['MA10', fmt(ind.ma10)], ['MA20', fmt(ind.ma20)], ['MA60', fmt(ind.ma60)],
    ['RSI14', fmt(ind.rsi14,1)], ['MACD柱', fmt((ind.macd||{}).hist,3)],
    ['量比', ind.vol_ratio==null?'—':fmt(ind.vol_ratio,2)], ['BOLL中轨', fmt((ind.boll||{}).mid)]
  ];
  html += '<div class="ind-grid">' + cells.map(c =>
    '<div class="cell"><div class="k">'+esc(c[0])+'</div><div class="v">'+esc(c[1])+'</div></div>').join('') + '</div>';
  html += '</div></section>';
  A.innerHTML = html;

  // quick may also carry its own news payload (prefer dedicated /news already loaded, but use this if richer)
  if (Array.isArray(data.news) && data.news.length){
    renderNewsInto($('newsBox'), data.news);
  }
  if (data.disclaimer) $('footDisc').textContent = data.disclaimer;
}

/* ===================================================================
   DEEP mode  (the highlight)
=================================================================== */
function renderDeep(data){
  const A = $('analysis');
  const members = Array.isArray(data.members) ? data.members : [];
  const chair = data.chairman || {};
  const gov = Array.isArray(data.governance_report) ? data.governance_report : [];
  const ml = data.ml || {};
  const ds = data.data_status || 'fresh';
  const conf = (data.confidence != null) ? data.confidence : (chair.confidence != null ? chair.confidence : 0);

  let html = '';

  /* ---- conflict banner ---- */
  if (data.conflict){
    const di = (typeof data.disagreement === 'number') ? data.disagreement : null;
    html += '<section><div class="notice"><b>⚠ 委员意见冲突</b> — 存在偏多/偏空对立，治理引擎按<b>分歧指数'
      + (di != null ? ' ' + di : '') + '</b>（0=一致，1=势均力敌）梯度压低置信度天花板并强制暴露分歧。</div></section>';
  }

  /* ---- 1. committee ---- */
  html += '<section><div class="sec-title">Committee · 委员会研判 <span class="cn">证据链投研委员会</span></div>';
  html += '<div class="grid mem">';
  members.forEach(m => { html += memberCard(m); });
  if (!members.length) html += '<div class="empty-soft">无委员意见。</div>';
  html += '</div></section>';

  /* ---- 2. chairman + ring ---- */
  html += '<section><div class="sec-title">Chairman · 主席结论 <span class="cn">汇总 · 置信度环</span></div><div class="card"><div class="chair-grid">';
  html += confRing(conf, data.verdict || chair.final || '中性');
  html += '<div class="chair-detail"><dl>'
    + dlRow('多数意见', chair.majority)
    + dlRow('少数意见', chair.minority)
    + dlRow('分歧来源', chair.disagreement)
    + '</dl></div>';
  html += '</div></div></section>';

  /* ---- 3. counter-evidence-aware decision panel ---- */
  html += '<section><div class="sec-title">Decision · 反证驱动决策解释 <span class="cn">Counter-evidence-aware</span></div>';
  html += '<div class="ce-panel"><div class="ce-grid">';
  html += ceBlock('support', '主要支持证据', 'KEY EVIDENCE', chair.key_evidence);
  html += ceBlock('against', '主要反对证据', 'COUNTER EVIDENCE', chair.counter_evidence);
  html += ceBlock('invalid', '结论失效条件', 'INVALIDATION', chair.invalidation);
  html += ceBlock('dissent', '异议委员', 'DISSENT', chair.dissent);
  html += ceBlock('risk', '最大风险', 'MAX RISK', chair.max_risk);
  html += ceBlock('reason', '置信度解释', 'CONFIDENCE REASON', chair.confidence_reason);
  // governance log spans full width
  html += '<div class="ce-block full"><div class="k"><span class="cn">治理记录</span> GOVERNANCE REPORT · R1–R9</div>'
    + '<div class="govlog">' + (gov.length
        ? gov.map((g,i) => '<div class="ln"><span class="idx">'+String(i+1).padStart(2,'0')+'</span><span class="rule">'+esc(g)+'</span></div>').join('')
        : '<div class="empty">无规则触发 — 证据充分、数据新鲜、无冲突。置信度天花板维持默认 0.85。</div>')
    + '</div>'
    + '<div style="margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">'
    + '<span class="badge '+esc(ds)+'">数据 '+ (DATA_STATUS_CN[ds]||ds) +'</span>'
    + '<span style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)">'+esc(data.disclaimer || '仅供学习研究，不构成投资建议。')+'</span>'
    + '</div></div>';
  html += '</div></div></section>';

  /* ---- 4. ML risk-calibration ticket (波动信号) ---- */
  html += '<section><div class="sec-title">ML · XGBoost 风险信号 <span class="cn">次日波动预测（校准不确定性）</span></div><div class="card"><div class="ml-ticket">';
  const pbm = ml.prob_big_move;
  const abst = ml.abstain || pbm == null;
  const lvl = pbm == null ? '' : (pbm > 0.6 ? '高' : (pbm > 0.4 ? '中' : '低'));
  html += '<div class="stub"><div class="k">次日大波动概率</div><div class="v'+(abst?' abst':'')+'">'
    + (abst ? '弃权' : (pct(pbm) + (lvl ? ' · '+lvl+'风险' : ''))) + '</div></div>';
  html += '<div class="stub"><div class="k">样本外 AUC</div><div class="v'+(ml.auc==null?' abst':'')+'">'
    + (ml.auc==null?'—':fmt(ml.auc,3)) + '</div></div>';
  html += '<div class="note">'
    + (abst ? ('该票<b style="color:var(--amber)"> 已弃权</b>'+ (ml.abstain_reason ? '：'+esc(ml.abstain_reason) : '（AUC≈0.5 或样本不足）') + '。治理规则 R4 会将其剔除。')
            : '模型预测<b>次日是否为大波动日</b>（波动具聚集性、可学习），用于<b>校准不确定性</b>而非指示方向；高波动 → 治理规则 R7 下调整体置信度。')
    + '</div>';
  html += '</div></div></section>';

  /* ---- 5. trustworthy backtest (净值曲线 + 显著性) ---- */
  const bt = data.backtest;
  const hasBt = bt && Array.isArray(bt.equity_curve) && bt.equity_curve.length >= 2 && !bt.error;
  if (hasBt){
    const sig = bt.significance || {};
    const sigTxt = sig.significant === true ? ('显著 (p='+sig.p_value+')')
                 : sig.significant === false ? ('不显著 (p='+sig.p_value+'，恐为运气)')
                 : '样本不足';
    html += '<section><div class="sec-title">Backtest · 可信回测 <span class="cn">双均线净值 vs 买入持有 · 块自助显著性</span></div>'
      + '<div class="card"><div class="review-stats">'
      + '<div class="stat"><div class="k">策略收益</div><div class="v">'+pct(bt.total_return)+'</div></div>'
      + '<div class="stat"><div class="k">买入持有</div><div class="v">'+pct(bt.benchmark_return)+'</div></div>'
      + '<div class="stat"><div class="k">最大回撤</div><div class="v">'+pct(bt.max_drawdown)+'</div></div>'
      + '<div class="stat"><div class="k">夏普</div><div class="v">'+fmt(bt.sharpe,2)+'</div></div>'
      + '<div class="stat"><div class="k">边际显著性</div><div class="v'+(sig.significant===false?' warn':'')+'">'+esc(sigTxt)+'</div></div>'
      + '</div><div id="bt-chart" style="height:240px;margin-top:12px"></div>'
      + '<div class="chart-note">'+esc(bt.disclaimer||'')+'</div></div></section>';
  }

  A.innerHTML = html;
  if (hasBt){
    try {
      if (btChart){ btChart.dispose(); btChart = null; }
      btChart = echarts.init($('bt-chart'), null, { renderer:'canvas' });
      const eq = bt.equity_curve, bench = bt.benchmark_curve || [];
      btChart.setOption({
        grid:{ left:46, right:16, top:26, bottom:22 },
        tooltip:{ trigger:'axis' },
        legend:{ data:['策略净值','买入持有'], top:0, textStyle:{ fontSize:11 } },
        xAxis:{ type:'category', data:eq.map((_,i)=>i), axisLabel:{ show:false } },
        yAxis:{ type:'value', scale:true },
        series:[
          { name:'策略净值', type:'line', data:eq, smooth:true, showSymbol:false, lineStyle:{ width:2 } },
          { name:'买入持有', type:'line', data:bench, smooth:true, showSymbol:false, lineStyle:{ width:1, type:'dashed' } }
        ]
      });
    } catch(e){ /* 图表失败不影响其余面板 */ }
  }
  if (data.disclaimer) $('footDisc').textContent = data.disclaimer;
}

function memberCard(m){
  const ab = !!m.abstain;
  const v = m.verdict || '中性';
  const vc = ab ? 'v-abst' : verdictClass(v);
  const vlabel = ab ? '弃权' : v;
  const c = Math.max(0, Math.min(1, Number(m.confidence)||0));
  let html = '<div class="member"><div class="head">'
    + '<span class="lens">'+esc(m.lens||'委员')+'</span>'
    + '<span class="verdict '+vc+'">'+esc(vlabel)+'</span></div>';

  if (ab){
    html += '<div class="abstain-box">⊘ 已弃权：'+esc(m.abstain_reason || '数据/证据不足，按治理要求拒绝给出强结论')+'</div>';
  }

  html += '<div class="conf"><div class="meta"><span>CONFIDENCE</span><span>'+pct(c)+'</span></div>'
    + '<div class="track"><div class="fill" style="width:'+(c*100).toFixed(0)+'%"></div></div></div>';

  const reasons = Array.isArray(m.reasons) ? m.reasons.filter(Boolean) : [];
  if (reasons.length){
    html += '<ul class="reasons">' + reasons.map(r => '<li>'+esc(r)+'</li>').join('') + '</ul>';
  }

  const ev = Array.isArray(m.evidence) ? m.evidence : [];
  if (ev.length){
    html += '<div class="ev-title">证据 · Evidence</div>';
    html += ev.map(e => evidenceLine(e, false)).join('');
  }

  const ce = Array.isArray(m.counter_evidence) ? m.counter_evidence.filter(Boolean) : [];
  if (ce.length){
    html += '<div class="chips-sm">' + ce.map(x =>
      '<span class="chip-counter">反证 · '+esc(typeof x==='string'?x:(x.value||JSON.stringify(x)))+'</span>').join('') + '</div>';
  }
  const risks = Array.isArray(m.risks) ? m.risks.filter(Boolean) : [];
  if (risks.length){
    html += '<div class="chips-sm">' + risks.map(r => '<span class="chip-risk">风险 · '+esc(r)+'</span>').join('') + '</div>';
  }
  html += '</div>';
  return html;
}

function evidenceLine(e, counter){
  if (e == null) return '';
  if (typeof e === 'string'){
    return '<div class="ev'+(counter?' counter':'')+'"><div class="row eval">'+esc(e)+'</div></div>';
  }
  const type = e.type || '?';
  const src  = e.source || '';
  const val  = e.value == null ? '' : (typeof e.value === 'object' ? JSON.stringify(e.value) : e.value);
  const intp = e.interpretation || '';
  // render as: [type] source: value — interpretation  (mono)
  return '<div class="ev'+(counter?' counter':'')+'"><div class="row">'
    + '<span class="etype">['+esc(type)+']</span> '
    + (src ? '<span class="esrc">'+esc(src)+'</span>: ' : '')
    + '<span class="eval">'+esc(val)+'</span>'
    + (intp ? ' <span class="eint">— '+esc(intp)+'</span>' : '')
    + '</div></div>';
}

function confRing(conf, verdict){
  const c = Math.max(0, Math.min(1, Number(conf)||0));
  const R = 64, C = 2*Math.PI*R;
  const off = C * (1 - c);
  // colour ring by verdict
  const ringColor = verdict==='偏多' ? '#e2675f' : verdict==='偏空' ? '#3fcf8e' : '#5fa8e2';
  const vClass = verdict==='偏多' ? 'up' : verdict==='偏空' ? 'down' : 'flat';
  return '<div class="ring-wrap"><div class="ring">'
    + '<svg width="160" height="160" viewBox="0 0 160 160">'
    + '<circle cx="80" cy="80" r="'+R+'" fill="none" stroke="#26332c" stroke-width="11"></circle>'
    + '<circle cx="80" cy="80" r="'+R+'" fill="none" stroke="'+ringColor+'" stroke-width="11" stroke-linecap="round"'
    + ' stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"'
    + ' style="transition:stroke-dashoffset .8s ease"></circle></svg>'
    + '<div class="ctr"><div class="pct" style="color:'+ringColor+'">'+(c*100).toFixed(0)+'%</div>'
    + '<div class="lbl">Confidence</div></div></div>'
    + '<div class="ring-verdict '+vClass+'">'+esc(verdict)+'</div></div>';
}

function ceBlock(kind, cn, en, val){
  const has = val != null && String(val).trim() !== '';
  return '<div class="ce-block '+kind+'"><div class="k"><span class="cn">'+esc(cn)+'</span> '+esc(en)+'</div>'
    + '<div class="v">'+ (has ? esc(val) : '<span style="color:var(--ink-faint)">—（主席未提供 / 不适用）</span>') +'</div></div>';
}
function dlRow(k, v){
  return '<dt>'+esc(k)+'</dt><dd>'+ (v!=null && String(v).trim() ? esc(v) : '<span style="color:var(--ink-faint)">—</span>') +'</dd>';
}

/* ===================================================================
   REVIEW mode
=================================================================== */
function renderReview(data){
  const A = $('analysis');
  if (isErr(data)){ A.innerHTML = sectionNotice('复盘失败', errMsg(data), true); return; }
  const r = data.review || {};
  const reviewed = r.reviewed || 0;
  const hit = r.hit_rate;
  const over = !!r.chairman_overconfident;
  let html = '<section><div class="sec-title">Review · 复盘自审计 <span class="cn">研判准确性回溯</span></div><div class="card">';
  html += '<div class="review-stats">'
    + '<div class="stat"><div class="k">已复盘</div><div class="v">'+reviewed+'</div></div>'
    + '<div class="stat"><div class="k">命中率</div><div class="v'+(hit!=null&&hit<0.5?' warn':'')+'">'+(hit==null?'—':pct(hit))+'</div></div>'
    + '<div class="stat"><div class="k">主席过度自信</div><div class="v'+(over?' warn':'')+'">'+(over?'是 ⚠':'否')+'</div></div>'
    + '</div>';
  // by member
  const bm = r.by_member || {};
  const keys = Object.keys(bm);
  if (keys.length){
    html += '<div class="bymem"><div class="ev-title">分委员命中</div>'
      + keys.map(k => {
          const v = bm[k];
          const disp = (v && typeof v === 'object')
            ? Object.entries(v).map(e => e[0]+': '+ (typeof e[1]==='number' && e[1]<=1 ? pct(e[1]) : e[1])).join(' · ')
            : (typeof v === 'number' && v<=1 ? pct(v) : esc(String(v)));
          return '<div class="row"><span>'+esc(k)+'</span><span>'+esc(disp)+'</span></div>';
        }).join('')
      + '</div>';
  }
  // calibration (Brier / ECE / 可靠性分箱) —— 把"主席是否过度自信"做成可对角线验证的事实
  const cal = r.calibration;
  if (cal){
    const vWarn = (cal.verdict === '过度自信') ? ' warn' : '';
    html += '<div class="review-stats" style="margin-top:14px">'
      + '<div class="stat"><div class="k">Brier</div><div class="v">'+cal.brier+'</div></div>'
      + '<div class="stat"><div class="k">ECE</div><div class="v">'+cal.ece+'</div></div>'
      + '<div class="stat"><div class="k">校准判定</div><div class="v'+vWarn+'">'+esc(cal.verdict)+'</div></div>'
      + '</div>';
    const rel = cal.reliability || [];
    if (rel.length){
      html += '<div class="bymem"><div class="ev-title">可靠性分箱（预测置信度 vs 实际命中；命中显著低于置信=过度自信）</div>'
        + rel.map(b => {
            const off = (b.accuracy < b.avg_conf - 0.1);
            return '<div class="row"><span>置信≈'+pct(b.avg_conf)+'（n='+b.n+'）</span>'
              + '<span'+(off?' style="color:var(--amber)"':'')+'>实际命中 '+pct(b.accuracy)+'</span></div>';
          }).join('')
        + '</div>';
    }
  }
  html += '<div class="review-note'+(over?' warn':'')+'">'+esc(r.note || '暂无复盘记录。')+'</div>';
  html += '</div></section>';
  A.innerHTML = html;
  if (data.disclaimer) $('footDisc').textContent = data.disclaimer;
}

/* ===================================================================
   TEACH mode
=================================================================== */
function renderTeach(data){
  const A = $('analysis');
  if (isErr(data)){ A.innerHTML = sectionNotice('教学内容加载失败', errMsg(data), true); return; }
  const content = data.content || {};
  const keys = Object.keys(content);
  let html = '<section><div class="sec-title">Teach · 教学 <span class="cn">术语与方法</span></div><div class="card"><div class="teach-list">';
  if (!keys.length){
    html += '<div class="empty-soft">暂无教学内容。</div>';
  } else {
    html += keys.map(k =>
      '<div class="term"><div class="t">'+esc(k)+'</div><div class="d">'+esc(content[k])+'</div></div>').join('');
  }
  html += '</div></div></section>';
  A.innerHTML = html;
  if (data.disclaimer) $('footDisc').textContent = data.disclaimer;
}

/* ===================================================================
   STATUS modal
=================================================================== */
async function openStatus(){
  const modal = $('statusModal'); modal.classList.add('open');
  const body = $('statusBody');
  body.innerHTML = '<div class="loading"><i></i><i></i><i></i> 探测中…</div>';
  const s = await getJSON('/api/status');
  if (isErr(s)){ body.innerHTML = '<div class="notice err">状态接口不可用：'+esc(errMsg(s))+'</div>'; return; }
  const svc = [['gateway', s.gateway], ['agent', s.agent], ['storage', s.storage]];
  let html = svc.map(([k,v]) => {
    const ok = v === 'ok';
    return '<div class="srow"><span class="k"><span class="dot '+(ok?'ok':'bad')+'"></span>'+esc(k)+'</span>'
      + '<span class="'+(ok?'ok':'down')+'">'+esc(v==null?'?':v)+'</span></div>';
  }).join('');
  const m = s.metrics || {};
  html += '<div class="mc">metrics &nbsp; requests='+esc(m.requests==null?'—':m.requests)
    + ' · finance='+esc(m.finance==null?'—':m.finance)+'</div>';
  body.innerHTML = html;
}
$('statusModal').addEventListener('click', e => { if (e.target.id === 'statusModal') e.currentTarget.classList.remove('open'); });

/* ---------------- boot ---------------- */
run();
</script>
